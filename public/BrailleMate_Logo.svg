<svg xmlns:xlink="http://www.w3.org/1999/xlink" id="brailleMateLogo" width="300" height="300" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="blueGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#7CD4E6"/>
                    <stop offset="100%" style="stop-color:#2D8CAC"/>
                </linearGradient>
                <linearGradient id="orangeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#F5CAB1"/>
                    <stop offset="100%" style="stop-color:#E88B5D"/>
                </linearGradient>
            </defs>
            
            <!-- Main Vertical Pill (Left) -->
            <rect x="40" y="30" width="50" height="140" rx="25" fill="url(#blueGrad1)"/>
            
            <!-- Top Horizontal Pill (Right Top) -->
            <rect x="100" y="30" width="60" height="60" rx="30" fill="url(#orangeGrad1)"/>
            
            <!-- Bottom Horizontal Pill (Right Bottom) -->
            <rect x="100" y="110" width="60" height="60" rx="30" fill="url(#orangeGrad1)" opacity="0.8"/>
        </svg>