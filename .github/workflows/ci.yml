name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 같은 브랜치/PR 에서 새 푸시가 들어오면 진행 중인 잡을 취소해서 자원 절약
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type check, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Patch @ohah/hwpjs-wasm32-wasi
        shell: bash
        run: |
          mkdir -p node_modules/@ohah/hwpjs-wasm32-wasi
          curl -sL "https://registry.npmjs.org/@ohah/hwpjs-wasm32-wasi/-/hwpjs-wasm32-wasi-0.1.0-rc.4.tgz" \
            | tar xz -C node_modules/@ohah/hwpjs-wasm32-wasi --strip-components=1

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run tests
        run: bun run test

      - name: Build (verifies prod bundle compiles)
        run: bun run build
